<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
  html,body{margin:0;padding:0;background:white;font-family:"Inter","Helvetica Neue",Arial,sans-serif;color:#1b1f24;}
  .wrap{padding:14px 18px;width:1200px;}
</style></head><body>
<div class="wrap">
<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b3f47"/>
    </marker>
  </defs>

  <!-- ============ LEFT PANEL: base bandit p_i[o] ============ -->
  <g transform="translate(20, 30)">
    <text x="0" y="0" font-size="13" font-weight="700">base bandit $p_i[o]$</text>
    <text x="0" y="16" font-size="10" fill="#5b6471">EXP3-IX, island-level</text>

    <g transform="translate(0, 40)">
      <line x1="0" y1="200" x2="240" y2="200" stroke="#5b6471" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="200" stroke="#5b6471" stroke-width="0.8"/>

      <rect x="6"   y="80"  width="14" height="120" fill="#2c3e8a"/>
      <rect x="22"  y="100" width="14" height="100" fill="#2c3e8a"/>
      <rect x="38"  y="120" width="14" height="80"  fill="#2c3e8a"/>
      <rect x="54"  y="130" width="14" height="70"  fill="#5474c0"/>
      <rect x="70"  y="140" width="14" height="60"  fill="#5474c0"/>
      <rect x="86"  y="150" width="14" height="50"  fill="#5474c0"/>
      <rect x="102" y="155" width="14" height="45"  fill="#9bb0d8"/>
      <rect x="118" y="160" width="14" height="40"  fill="#9bb0d8"/>
      <rect x="134" y="165" width="14" height="35"  fill="#9bb0d8"/>
      <rect x="150" y="170" width="14" height="30"  fill="#c3cfe6"/>
      <rect x="166" y="175" width="14" height="25"  fill="#c3cfe6"/>
      <rect x="182" y="180" width="14" height="20"  fill="#c3cfe6"/>
      <rect x="198" y="183" width="14" height="17"  fill="#dbe2f0"/>
      <rect x="214" y="186" width="14" height="14"  fill="#dbe2f0"/>

      <text x="120" y="220" font-size="10" fill="#5b6471" text-anchor="middle">operators $o$</text>
    </g>
  </g>

  <!-- ============ MIDDLE PANEL: niche EMA bonus ============ -->
  <g transform="translate(310, 30)">
    <text x="0" y="0" font-size="13" font-weight="700">niche bonus $0.5 + \mathrm{ema}_i[\nu, o]$</text>
    <text x="0" y="16" font-size="10" fill="#5b6471">parent-specific</text>

    <!-- niche A bars -->
    <g transform="translate(0, 40)">
      <text x="0" y="0" font-size="10.5" font-weight="600" fill="#2b6a3a">$\nu_A$ &nbsp;(layer-sparse, low MAC, head-heavy)</text>
      <line x1="0" y1="84" x2="280" y2="84" stroke="#5b6471" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="84" stroke="#5b6471" stroke-width="0.8"/>

      <rect x="6"   y="22" width="14" height="62" fill="#2b6a3a"/>
      <rect x="22"  y="40" width="14" height="44" fill="#2b6a3a"/>
      <rect x="38"  y="55" width="14" height="29" fill="#2b6a3a"/>
      <rect x="54"  y="48" width="14" height="36" fill="#5fa672"/>
      <rect x="70"  y="60" width="14" height="24" fill="#5fa672"/>
      <rect x="86"  y="34" width="14" height="50" fill="#5fa672"/>
      <rect x="102" y="62" width="14" height="22" fill="#9fc8a8"/>
      <rect x="118" y="58" width="14" height="26" fill="#9fc8a8"/>
      <rect x="134" y="64" width="14" height="20" fill="#9fc8a8"/>
      <rect x="150" y="66" width="14" height="18" fill="#cce1d2"/>
      <rect x="166" y="68" width="14" height="16" fill="#cce1d2"/>
      <rect x="182" y="70" width="14" height="14" fill="#cce1d2"/>
      <rect x="198" y="72" width="14" height="12" fill="#dde9e1"/>
      <rect x="214" y="74" width="14" height="10" fill="#dde9e1"/>
    </g>

    <!-- niche B bars -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-size="10.5" font-weight="600" fill="#b2570c">$\nu_B$ &nbsp;(balanced, high MAC, neuron-heavy)</text>
      <line x1="0" y1="84" x2="280" y2="84" stroke="#5b6471" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="84" stroke="#5b6471" stroke-width="0.8"/>

      <rect x="6"   y="68" width="14" height="16" fill="#b2570c"/>
      <rect x="22"  y="60" width="14" height="24" fill="#b2570c"/>
      <rect x="38"  y="56" width="14" height="28" fill="#b2570c"/>
      <rect x="54"  y="40" width="14" height="44" fill="#d4823a"/>
      <rect x="70"  y="30" width="14" height="54" fill="#d4823a"/>
      <rect x="86"  y="48" width="14" height="36" fill="#d4823a"/>
      <rect x="102" y="22" width="14" height="62" fill="#e8b285"/>
      <rect x="118" y="44" width="14" height="40" fill="#e8b285"/>
      <rect x="134" y="36" width="14" height="48" fill="#e8b285"/>
      <rect x="150" y="62" width="14" height="22" fill="#f1d4b4"/>
      <rect x="166" y="55" width="14" height="29" fill="#f1d4b4"/>
      <rect x="182" y="60" width="14" height="24" fill="#f1d4b4"/>
      <rect x="198" y="65" width="14" height="19" fill="#fae8d6"/>
      <rect x="214" y="68" width="14" height="16" fill="#fae8d6"/>
    </g>
  </g>

  <!-- multiplication symbol -->
  <text x="600" y="190" font-size="22" font-weight="700" fill="#5b6471" text-anchor="middle">$\cdot$ then norm</text>
  <text x="290" y="190" font-size="22" font-weight="700" fill="#5b6471">$\times$</text>

  <!-- arrow -->
  <line x1="270" y1="195" x2="306" y2="195" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="660" y1="195" x2="696" y2="195" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- ============ RIGHT PANEL: reweighted p_tilde ============ -->
  <g transform="translate(700, 30)">
    <text x="0" y="0" font-size="13" font-weight="700">reweighted $\tilde p_i[o; \nu]$</text>
    <text x="0" y="16" font-size="10" fill="#5b6471">used to sample the child</text>

    <!-- nu_A reweighted -->
    <g transform="translate(0, 40)">
      <text x="0" y="0" font-size="10.5" font-weight="600" fill="#2b6a3a">$\tilde p_i[\cdot;\nu_A]$</text>
      <line x1="0" y1="84" x2="280" y2="84" stroke="#5b6471" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="84" stroke="#5b6471" stroke-width="0.8"/>

      <rect x="6"   y="20" width="14" height="64" fill="#2b6a3a"/>
      <rect x="22"  y="36" width="14" height="48" fill="#2b6a3a"/>
      <rect x="38"  y="55" width="14" height="29" fill="#2b6a3a"/>
      <rect x="54"  y="50" width="14" height="34" fill="#2b6a3a"/>
      <rect x="70"  y="64" width="14" height="20" fill="#5fa672"/>
      <rect x="86"  y="50" width="14" height="34" fill="#5fa672"/>
      <rect x="102" y="68" width="14" height="16" fill="#5fa672"/>
      <rect x="118" y="68" width="14" height="16" fill="#9fc8a8"/>
      <rect x="134" y="70" width="14" height="14" fill="#9fc8a8"/>
      <rect x="150" y="72" width="14" height="12" fill="#9fc8a8"/>
      <rect x="166" y="74" width="14" height="10" fill="#cce1d2"/>
      <rect x="182" y="76" width="14" height="8" fill="#cce1d2"/>
      <rect x="198" y="78" width="14" height="6" fill="#dde9e1"/>
      <rect x="214" y="80" width="14" height="4" fill="#dde9e1"/>
    </g>

    <!-- nu_B reweighted -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-size="10.5" font-weight="600" fill="#b2570c">$\tilde p_i[\cdot;\nu_B]$</text>
      <line x1="0" y1="84" x2="280" y2="84" stroke="#5b6471" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="84" stroke="#5b6471" stroke-width="0.8"/>

      <rect x="6"   y="60" width="14" height="24" fill="#b2570c"/>
      <rect x="22"  y="58" width="14" height="26" fill="#b2570c"/>
      <rect x="38"  y="48" width="14" height="36" fill="#b2570c"/>
      <rect x="54"  y="34" width="14" height="50" fill="#d4823a"/>
      <rect x="70"  y="20" width="14" height="64" fill="#d4823a"/>
      <rect x="86"  y="42" width="14" height="42" fill="#d4823a"/>
      <rect x="102" y="22" width="14" height="62" fill="#e8b285"/>
      <rect x="118" y="46" width="14" height="38" fill="#e8b285"/>
      <rect x="134" y="38" width="14" height="46" fill="#e8b285"/>
      <rect x="150" y="68" width="14" height="16" fill="#f1d4b4"/>
      <rect x="166" y="64" width="14" height="20" fill="#f1d4b4"/>
      <rect x="182" y="66" width="14" height="18" fill="#f1d4b4"/>
      <rect x="198" y="74" width="14" height="10" fill="#fae8d6"/>
      <rect x="214" y="76" width="14" height="8" fill="#fae8d6"/>
    </g>
  </g>

</svg>
</div>
</body></html>
