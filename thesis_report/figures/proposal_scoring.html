<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
  html,body{margin:0;padding:0;background:white;font-family:"Inter","Helvetica Neue",Arial,sans-serif;color:#1b1f24;}
  .wrap{padding:14px 18px;width:1200px;}
</style></head><body>
<div class="wrap">
<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b3f47"/>
    </marker>
  </defs>

  <!-- teacher + calibration batch -->
  <rect x="20" y="40" width="180" height="80" rx="6" fill="#eef3f8" stroke="#9bb0d8"/>
  <text x="110" y="68" font-size="13" font-weight="700" text-anchor="middle">teacher $\mathcal{T}$</text>
  <text x="110" y="88" font-size="11" fill="#5b6471" text-anchor="middle">frozen; per-layer update target</text>
  <text x="110" y="106" font-size="11" fill="#5b6471" text-anchor="middle">$\Delta^{(\mathcal{T})}_{\ell}$</text>

  <rect x="20" y="160" width="180" height="80" rx="6" fill="#fff7ee" stroke="#e8caa1"/>
  <text x="110" y="188" font-size="13" font-weight="700" text-anchor="middle">calibration $\mathcal{D}_{\mathrm{cal}}$</text>
  <text x="110" y="208" font-size="11" fill="#5b6471" text-anchor="middle">few hundred sequences</text>

  <!-- arrows to gradient/MSE block -->
  <line x1="200" y1="80" x2="270" y2="120" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="200" y1="200" x2="270" y2="160" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- gradient & MSE box -->
  <rect x="270" y="100" width="280" height="80" rx="6" fill="#fafbfd" stroke="#c9ced6"/>
  <text x="410" y="125" font-size="12" font-weight="700" text-anchor="middle">gate gradients + zero-out MSE</text>
  <text x="410" y="145" font-size="11" fill="#5b6471" text-anchor="middle">$g_{\ell,h}(x), g_{\ell,n}(x)$</text>
  <text x="410" y="165" font-size="11" fill="#5b6471" text-anchor="middle">$\mathrm{MSE}(\widetilde\Delta_\ell, \Delta_\ell)$</text>

  <!-- arrow to s_H, s_N -->
  <line x1="550" y1="140" x2="620" y2="140" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- s_H, s_N heatmaps -->
  <g transform="translate(620, 60)">
    <text x="0" y="0" font-size="12" font-weight="700">$s_H[\ell, h]$</text>
    <g>
      <rect x="0" y="10" width="12" height="12" fill="#1f2c63"/>
      <rect x="13" y="10" width="12" height="12" fill="#4a5fb5"/>
      <rect x="26" y="10" width="12" height="12" fill="#9bb0d8"/>
      <rect x="39" y="10" width="12" height="12" fill="#c3cfe6"/>
      <rect x="0" y="23" width="12" height="12" fill="#4a5fb5"/>
      <rect x="13" y="23" width="12" height="12" fill="#1f2c63"/>
      <rect x="26" y="23" width="12" height="12" fill="#9bb0d8"/>
      <rect x="39" y="23" width="12" height="12" fill="#c3cfe6"/>
      <rect x="0" y="36" width="12" height="12" fill="#9bb0d8"/>
      <rect x="13" y="36" width="12" height="12" fill="#c3cfe6"/>
      <rect x="26" y="36" width="12" height="12" fill="#1f2c63"/>
      <rect x="39" y="36" width="12" height="12" fill="#4a5fb5"/>
      <rect x="0" y="49" width="12" height="12" fill="#c3cfe6"/>
      <rect x="13" y="49" width="12" height="12" fill="#9bb0d8"/>
      <rect x="26" y="49" width="12" height="12" fill="#4a5fb5"/>
      <rect x="39" y="49" width="12" height="12" fill="#1f2c63"/>
    </g>
  </g>

  <g transform="translate(720, 60)">
    <text x="0" y="0" font-size="12" font-weight="700">$s_N[\ell, n]$</text>
    <g>
      <rect x="0" y="10" width="6" height="12" fill="#1f2c63"/>
      <rect x="7" y="10" width="6" height="12" fill="#4a5fb5"/>
      <rect x="14" y="10" width="6" height="12" fill="#9bb0d8"/>
      <rect x="21" y="10" width="6" height="12" fill="#c3cfe6"/>
      <rect x="28" y="10" width="6" height="12" fill="#dbe2f0"/>
      <rect x="35" y="10" width="6" height="12" fill="#eef1f8"/>
      <rect x="42" y="10" width="6" height="12" fill="#dbe2f0"/>
      <rect x="49" y="10" width="6" height="12" fill="#9bb0d8"/>
      <rect x="56" y="10" width="6" height="12" fill="#4a5fb5"/>
      <rect x="63" y="10" width="6" height="12" fill="#c3cfe6"/>
      <rect x="0" y="23" width="6" height="12" fill="#4a5fb5"/>
      <rect x="7" y="23" width="6" height="12" fill="#1f2c63"/>
      <rect x="14" y="23" width="6" height="12" fill="#9bb0d8"/>
      <rect x="21" y="23" width="6" height="12" fill="#c3cfe6"/>
      <rect x="28" y="23" width="6" height="12" fill="#1f2c63"/>
      <rect x="35" y="23" width="6" height="12" fill="#9bb0d8"/>
      <rect x="42" y="23" width="6" height="12" fill="#dbe2f0"/>
      <rect x="49" y="23" width="6" height="12" fill="#4a5fb5"/>
      <rect x="56" y="23" width="6" height="12" fill="#1f2c63"/>
      <rect x="63" y="23" width="6" height="12" fill="#9bb0d8"/>
      <rect x="0" y="36" width="6" height="12" fill="#9bb0d8"/>
      <rect x="7" y="36" width="6" height="12" fill="#c3cfe6"/>
      <rect x="14" y="36" width="6" height="12" fill="#1f2c63"/>
      <rect x="21" y="36" width="6" height="12" fill="#9bb0d8"/>
      <rect x="28" y="36" width="6" height="12" fill="#4a5fb5"/>
      <rect x="35" y="36" width="6" height="12" fill="#dbe2f0"/>
      <rect x="42" y="36" width="6" height="12" fill="#c3cfe6"/>
      <rect x="49" y="36" width="6" height="12" fill="#1f2c63"/>
      <rect x="56" y="36" width="6" height="12" fill="#4a5fb5"/>
      <rect x="63" y="36" width="6" height="12" fill="#9bb0d8"/>
      <rect x="0" y="49" width="6" height="12" fill="#c3cfe6"/>
      <rect x="7" y="49" width="6" height="12" fill="#9bb0d8"/>
      <rect x="14" y="49" width="6" height="12" fill="#4a5fb5"/>
      <rect x="21" y="49" width="6" height="12" fill="#1f2c63"/>
      <rect x="28" y="49" width="6" height="12" fill="#dbe2f0"/>
      <rect x="35" y="49" width="6" height="12" fill="#c3cfe6"/>
      <rect x="42" y="49" width="6" height="12" fill="#1f2c63"/>
      <rect x="49" y="49" width="6" height="12" fill="#9bb0d8"/>
      <rect x="56" y="49" width="6" height="12" fill="#4a5fb5"/>
      <rect x="63" y="49" width="6" height="12" fill="#dbe2f0"/>
    </g>
  </g>

  <!-- arrows down to imp + blocks -->
  <line x1="650" y1="135" x2="650" y2="200" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="750" y1="135" x2="750" y2="200" stroke="#3b3f47" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- imp(l) bar -->
  <g transform="translate(620, 210)">
    <text x="0" y="0" font-size="12" font-weight="700">$\mathrm{imp}(\ell)$</text>
    <rect x="0"  y="10" width="14" height="40" fill="#2c3e8a"/>
    <rect x="16" y="14" width="14" height="36" fill="#2c3e8a"/>
    <rect x="32" y="22" width="14" height="28" fill="#5474c0"/>
    <rect x="48" y="32" width="14" height="18" fill="#9bb0d8"/>
    <line x1="-2" y1="52" x2="64" y2="52" stroke="#5b6471" stroke-width="0.8"/>
  </g>

  <!-- S_l[b] cumulative table -->
  <g transform="translate(720, 210)">
    <text x="0" y="0" font-size="12" font-weight="700">$S_\ell[b]$ cumulative block table</text>
    <polyline points="0,80 14,68 28,58 42,50 56,44 70,40 84,38 98,36 112,35 126,34.5" fill="none" stroke="#2b6a3a" stroke-width="1.6"/>
    <g fill="#2b6a3a">
      <circle cx="0" cy="80" r="2.4"/><circle cx="14" cy="68" r="2.4"/><circle cx="28" cy="58" r="2.4"/>
      <circle cx="42" cy="50" r="2.4"/><circle cx="56" cy="44" r="2.4"/><circle cx="70" cy="40" r="2.4"/>
      <circle cx="84" cy="38" r="2.4"/><circle cx="98" cy="36" r="2.4"/><circle cx="112" cy="35" r="2.4"/><circle cx="126" cy="34.5" r="2.4"/>
    </g>
    <line x1="0" y1="84" x2="130" y2="84" stroke="#5b6471" stroke-width="0.8"/>
    <text x="0" y="100" font-size="9" fill="#5b6471">block index $b$</text>
  </g>

  <!-- roles annotations on the right -->
  <g transform="translate(880, 60)">
    <rect x="0" y="0" width="280" height="270" rx="6" fill="#fafbfd" stroke="#dfe3ea"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#1b1f24">Three roles of the scores</text>

    <text x="14" y="50" font-size="11" font-weight="600" fill="#2c3e8a">Operator-internal selection</text>
    <text x="14" y="66" font-size="10.5" fill="#5b6471">Phase 3 operators sample heads /</text>
    <text x="14" y="80" font-size="10.5" fill="#5b6471">blocks by softmax of $s_H$, $s_N$.</text>

    <text x="14" y="110" font-size="11" font-weight="600" fill="#b2570c">Repair tie-break</text>
    <text x="14" y="126" font-size="10.5" fill="#5b6471">$S_\ell[b{+}1] - S_\ell[b]$ ranks the</text>
    <text x="14" y="140" font-size="10.5" fill="#5b6471">next block to add or remove.</text>

    <text x="14" y="170" font-size="11" font-weight="600" fill="#2b6a3a">Protected-core ranking</text>
    <text x="14" y="186" font-size="10.5" fill="#5b6471">$L_{\min}$ layers from the top of</text>
    <text x="14" y="200" font-size="10.5" fill="#5b6471">$\mathrm{imp}(\ell)$ stay minimally active.</text>
  </g>

</svg>
</div>
</body></html>
